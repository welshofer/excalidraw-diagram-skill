name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: references
        run: uv sync --dev

      - name: Run unit tests
        working-directory: references
        run: uv run python -m pytest tests/ -v --tb=short

      - name: Validate example files
        working-directory: references
        run: |
          for f in ../examples/*.excalidraw; do
            echo "Validating $f..."
            uv run python validate_excalidraw.py "$f"
          done

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: references
        run: |
          uv sync --dev
          uv run playwright install chromium --with-deps

      - name: Render example diagram
        working-directory: references
        run: |
          uv run python render_excalidraw.py ../examples/simple-flow.excalidraw --output /tmp/test-render.png
          test -s /tmp/test-render.png && echo "Render succeeded" || exit 1
