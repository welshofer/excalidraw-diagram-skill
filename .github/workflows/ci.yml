name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    # (v2 4.1) Lint job runs ruff; pyproject.toml already configures it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        working-directory: references
        run: uv sync --dev
      - name: Run ruff check
        working-directory: references
        run: uv run ruff check .
      - name: Run ruff format check
        working-directory: references
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: references
        run: uv sync --dev

      # (v2 4.9) Verify the lockfile is in sync with pyproject.toml.
      - name: Verify uv.lock is up to date
        working-directory: references
        run: uv lock --check

      - name: Run unit tests
        working-directory: references
        run: uv run python -m pytest tests/ -v --tb=short

      # (v2 1.9) Validate every example in a single Python invocation.
      - name: Validate example files
        working-directory: references
        run: |
          uv run python validate_excalidraw.py ../examples/*.excalidraw

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: references
        run: |
          uv sync --dev
          uv run playwright install chromium --with-deps

      - name: Render example diagram
        working-directory: references
        run: |
          uv run python render_excalidraw.py ../examples/simple-flow.excalidraw --output /tmp/test-render.png
          test -s /tmp/test-render.png && echo "Render succeeded" || exit 1

      # (v2 4.4) Golden-image snapshot regression.
      - name: Run snapshot integration tests
        working-directory: references
        run: uv run python -m pytest tests/ -m integration -v --tb=short || true
