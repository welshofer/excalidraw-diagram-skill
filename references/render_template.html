<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <!-- (5.4) Content Security Policy.
       (v2 5.1) Dropped 'unsafe-inline' from script-src. Inline module scripts
       are served under 'strict-dynamic' which trusts any script loaded
       transitively from a script with a nonce. For the vendor path, blob:
       URLs cover dynamic import from the vendor bundle. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src https://esm.sh blob: 'strict-dynamic' 'nonce-exc-template'; style-src 'unsafe-inline'; connect-src https://esm.sh; img-src 'self' data:">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module" nonce="exc-template">
    // (1.2) Pinned Excalidraw version for reproducible builds
    import { exportToSvg } from "https://esm.sh/@excalidraw/excalidraw@0.18.0?bundle";

    window.renderDiagram = async function(jsonData) {
      try {
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        // (2.3) Respect viewBackgroundColor from appState; default to white
        const bgColor = appState.viewBackgroundColor || "#ffffff";
        document.body.style.background = bgColor;

        // (2.3) Respect dark mode setting from appState
        const darkMode = appState.exportWithDarkMode || false;

        const svg = await exportToSvg({
          elements: elements,
          appState: {
            ...appState,
            viewBackgroundColor: bgColor,
            exportWithDarkMode: darkMode,
            exportBackground: true,
          },
          files: files,
        });

        // (1.3) Clear any previous render and reuse the page
        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);

        // (v2 3.9) Only set __renderComplete on success; on failure only set __renderError.
        window.__renderError = null;
        window.__renderComplete = true;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderError = err.message || String(err);
        return { success: false, error: err.message || String(err) };
      }
    };

    // Signal that the module is loaded and ready
    window.__moduleReady = true;
  </script>

  <!-- (4.10) Error handler for module load failures -->
  <script nonce="exc-template">
    window.addEventListener("error", function(e) {
      window.__moduleError = e.message || "Unknown module load error";
    });
  </script>
</body>
</html>
